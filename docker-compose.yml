services:
  courtlistener-mcp:
    container_name: courtlistener-mcp
    build:
      context: .
      args:
        TARGET_ENV: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      TARGET_ENV: dev
      REDIS_URL: redis://redis:6379
      COURTLISTENER_API_BASE_URL: ${COURTLISTENER_API_BASE_URL:-}
      MCP_SECRET_KEY: dev-insecure-do-not-use-in-production
    healthcheck:
      test: [
        "CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    container_name: redis
    image: redis:latest
    volumes:
      - redis-data:/data

volumes:
  redis-data: