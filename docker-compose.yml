services:
  courtlistener-mcp:
    container_name: courtlistener-mcp
    build:
      context: .
      args:
        TARGET_ENV: dev
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      TARGET_ENV: dev
      REDIS_URL: redis://redis:6379
      COURTLISTENER_API_BASE_URL: ${COURTLISTENER_API_BASE_URL:-}
      # OAuth defaults mirror the prod HTTP MCP deployment so local
      # `docker compose up` exercises the same auth path. Override any
      # of these via shell env — e.g. `MCP_REQUIRE_OAUTH=false` to
      # keep using `Authorization: Token <api_token>` locally, or
      # `COURTLISTENER_OAUTH_ISSUER=http://host.docker.internal:8000`
      # to validate JWTs against a local CourtListener dev instance.
      MCP_REQUIRE_OAUTH: ${MCP_REQUIRE_OAUTH:-true}
      COURTLISTENER_OAUTH_ISSUER: ${COURTLISTENER_OAUTH_ISSUER:-https://www.courtlistener.com}
      MCP_BASE_URL: ${MCP_BASE_URL:-http://localhost:8080}
    healthcheck:
      test: [
        "CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    container_name: redis
    image: redis:latest
    volumes:
      - redis-data:/data

volumes:
  redis-data: