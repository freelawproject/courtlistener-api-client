<!DOCTYPE html>
<html>
<head>
    <title>Authorize MCP Access - CourtListener (Staging)</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 24px; }
        .banner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 8px 12px; margin-bottom: 16px; font-size: 13px; }
        h1 { font-size: 20px; margin-top: 0; }
        .app-name { color: #1a73e8; font-weight: 600; }
        .scopes { background: #f8f9fa; border-radius: 4px; padding: 12px; margin: 16px 0; }
        .scopes li { margin: 4px 0; }
        .actions { display: flex; gap: 12px; margin-top: 20px; }
        button { padding: 10px 24px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; }
        .allow { background: #1a73e8; color: white; }
        .deny { background: #f1f3f4; color: #333; }
    </style>
</head>
<body>
    <div class="card">
        <div class="banner">STAGING - This is a test OAuth server, not real CourtListener.</div>

        <h1>Authorize Access</h1>
        <p>
            <span class="app-name">{{ application.name }}</span>
            wants to access your CourtListener account.
        </p>

        <div class="scopes">
            <strong>Requested permissions:</strong>
            <ul>
                {% for scope in scopes_descriptions %}
                <li>{{ scope }}</li>
                {% endfor %}
            </ul>
        </div>

        <form method="post" action="{% url 'oauth2_provider:authorize' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}" />
            <input type="hidden" name="scope" value="{{ scope }}" />
            <input type="hidden" name="client_id" value="{{ client_id }}" />
            <input type="hidden" name="state" value="{{ state }}" />
            <input type="hidden" name="response_type" value="{{ response_type }}" />
            <input type="hidden" name="code_challenge" value="{{ code_challenge }}" />
            <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}" />
            <div class="actions">
                <button type="submit" class="allow" name="allow" value="true">Allow</button>
                <button type="submit" class="deny" name="allow" value="false">Deny</button>
            </div>
        </form>
    </div>
</body>
</html>
